    <footer class="footer" role="contentinfo" aria-label="Información de contacto y derechos de autor">
      <p>© 2026 zebus3d</p>
      <div class="footer-actions">
        <button class="footer-contact" id="copy-email" aria-label="Copiar dirección de correo electrónico">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          <span>Copiar email</span>
        </button>
        <button class="footer-contact" id="send-email" aria-label="Abrir cliente de correo para enviar mensaje">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
          <span>Enviar email</span>
        </button>
      </div>
      <div id="copy-message" class="copy-message" aria-live="polite" role="alert"></div>
    </footer>
  </main>

  <script>
    (function() {
      const themeToggle = document.getElementById('theme-toggle');
      const root = document.documentElement;
      
      // Cargar tema guardado
      const savedTheme = localStorage.getItem('theme') || 'dark';
      root.setAttribute('data-theme', savedTheme);
      
      themeToggle.addEventListener('click', () => {
        const currentTheme = root.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        root.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
      });
    })();

     // Funcionalidad para copiar email
    (function() {
      const copyButton = document.getElementById('copy-email');
      const copyMessage = document.getElementById('copy-message');
      const sendButton = document.getElementById('send-email');
      
      // Función para obtener el email (ofuscado)
      function getEmail() {
        // Construir email dividiéndolo en partes
        const parts = [
          String.fromCharCode(122, 101, 98, 117, 115, 51, 100, 114, 101, 97, 109), // zebus3dream
          String.fromCharCode(64), // @
          String.fromCharCode(103, 109, 97, 105, 108, 46, 99, 111, 109) // gmail.com
        ];
        return parts.join('');
      }
      
      if (copyButton && copyMessage) {
        copyButton.addEventListener('click', async () => {
          const email = getEmail();
          
          try {
            await navigator.clipboard.writeText(email);
            
            // Mostrar mensaje de confirmación
            copyMessage.textContent = '✓ Email copiado al portapapeles';
            copyMessage.classList.add('show');
            
            // Restaurar texto después de 3 segundos
            setTimeout(() => {
              copyMessage.classList.remove('show');
              setTimeout(() => {
                copyMessage.textContent = '';
              }, 300);
            }, 3000);
            
            // Feedback visual del botón
            copyButton.style.borderColor = 'var(--accent)';
            copyButton.style.color = 'var(--accent)';
            setTimeout(() => {
              copyButton.style.borderColor = '';
              copyButton.style.color = '';
            }, 1000);
            
          } catch (err) {
            // Fallback para navegadores antiguos
            copyMessage.textContent = 'Error al copiar. Email: ' + getEmail();
            copyMessage.classList.add('show');
            setTimeout(() => {
              copyMessage.classList.remove('show');
              setTimeout(() => {
                copyMessage.textContent = '';
              }, 300);
            }, 5000);
          }
        });
      }
      
      if (sendButton) {
        sendButton.addEventListener('click', () => {
          const email = getEmail();
          const subject = 'Contact from zebus3d.github.io';
          window.location.href = 'mailto:' + email + '?Subject=' + encodeURIComponent(subject);
        });
      }
    })();
  </script>
