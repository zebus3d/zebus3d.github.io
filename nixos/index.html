    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a0f;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            line-height: 1.7;
            min-height: 100vh;
        }

        .bg-logo {
            position: fixed; bottom: 0; right: 0;
            transform: translate(50%, 50%);
            width: clamp(100vw, 120vw, 180vw); height: auto;
            opacity: 0.05;
            pointer-events: none; z-index: 0;
        }

        @media (max-width: 640px) {
            .bg-logo {
                width: 200vw;
                opacity: 0.05;
            }
        }

        .glow-orb {
            position: fixed; width: 600px; height: 600px;
            border-radius: 50%; filter: blur(150px);
            opacity: 0.07; pointer-events: none; z-index: 0;
        }
        .glow-orb.purple { background: #8b5cf6; top: -200px; right: -100px; }
        .glow-orb.blue { background: #3b82f6; bottom: -200px; left: -100px; }

        .container {
            max-width: 900px; margin: 0 auto;
            padding: 10px 20px 80px; position: relative; z-index: 1;
        }

        header {
            text-align: center; margin-bottom: 0;
            padding: 10px 0 10px;
        }

        h1 {
            font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, #c4b5fd, #818cf8, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text; margin-bottom: 4px;
        }

        header p { color: #94a3b8; font-size: 0.9rem; }

        html { scroll-behavior: smooth; }

        .sticky-nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(16px);
            padding: 5px 0 20px;
            margin-top: 0;
            border-radius: 20px;
            transition: border-radius 0.3s ease;
        }
        .sticky-nav.stuck {
            border-radius: 0 0 20px 20px;
        }

        .tab-bar {
            background: transparent;
            border: none; padding: 10px 0 0; margin-bottom: 0;
        }

        .tab-inner {
            max-width: 560px; margin: 0 auto; padding: 8px 20px 10px;
            display: flex; flex-wrap: wrap; gap: 6px;
            justify-content: center;
        }

        .tab-btn {
            flex: 1 1 calc(20% - 6px); min-width: 80px; max-width: 100px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            padding: 6px 8px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 8px;
            color: #64748b; font-family: 'Inter', sans-serif;
            font-size: 0.72rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s ease;
        }
        .tab-btn:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3);
            color: #c4b5fd;
        }
        .tab-btn.active {
            background: rgba(99, 102, 241, 0.18);
            border-color: rgba(99, 102, 241, 0.35);
            color: #a78bfa;
        }
        .tab-btn .tab-icon { font-size: 0.95rem; }

        #content {
            animation: page-in 0.3s ease;
            margin-top: 20px;
        }

        @keyframes page-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.4rem; font-weight: 600;
            color: #e2e8f0; margin-bottom: 20px;
            padding-left: 14px;
            border-left: 3px solid #6366f1;
            display: flex; align-items: center; gap: 10px;
        }
        h2 .icon { font-size: 1.2rem; }

        h3 {
            font-weight: 600; color: #a78bfa;
            margin: 24px 0 12px;
            text-transform: uppercase; letter-spacing: 0.05em;
            font-size: 0.82rem;
        }
        h3.recommended { color: #4ade80; }

        .card {
            background: rgba(15, 15, 25, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 12px; padding: 20px;
            margin-bottom: 16px; backdrop-filter: blur(10px);
            transition: border-color 0.3s ease;
        }
        .card:hover { border-color: rgba(99, 102, 241, 0.25); }

        .card.recommended {
            border-color: rgba(34, 197, 94, 0.3);
            background: rgba(34, 197, 94, 0.04);
        }
        .card.recommended:hover { border-color: rgba(34, 197, 94, 0.45); }

        .card-title {
            font-weight: 600; color: #c4b5fd;
            margin-bottom: 6px; font-size: 0.95rem;
            position: relative; cursor: help;
        }

        .card-title .tooltip {
            display: none; position: absolute;
            bottom: calc(100% + 8px); left: 0;
            background: rgba(15, 15, 30, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px; padding: 12px 16px;
            font-size: 0.82rem; font-weight: 400;
            color: #94a3b8; line-height: 1.6;
            width: max-content; max-width: 420px;
            z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            pointer-events: none;
        }
        .card-title .tooltip::after {
            content: ''; position: absolute; top: 100%; left: 20px;
            border: 6px solid transparent; border-top-color: rgba(15, 15, 30, 0.95);
        }
        .card-title .tooltip .tip_example {
            display: block; margin-top: 8px; padding: 6px 10px;
            background: rgba(99, 102, 241, 0.08); border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.76rem; color: #a78bfa;
        }
        .card-title:hover .tooltip { display: block; animation: tip-fade 0.2s ease; }

        @keyframes tip-fade {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes copy-tip-fade {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .card-desc { color: #94a3b8; font-size: 0.88rem; margin-bottom: 14px; }

        .code-block {
            background: #0d1117;
            border: 1px solid rgba(99, 102, 241, 0.12);
            border-radius: 10px; overflow: visible; margin: 10px 0;
        }

        .code-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 8px 14px;
            background: rgba(99, 102, 241, 0.06);
            border-bottom: 1px solid rgba(99, 102, 241, 0.1);
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.72rem; color: #64748b;
        }
        .code-header .dots { display: flex; gap: 6px; align-items: center; }
        .code-header .dot { font-size: 0.85rem; color: #a78bfa; font-family: 'JetBrains Mono', monospace; font-weight: 700; letter-spacing: 2px; }

        .copy-btn { position: relative; }

        .copy-tooltip {
            position: fixed;
            z-index: 99999;
            background: rgba(15, 15, 30, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px;
            padding: 8px 12px;
            font-size: 0.75rem;
            font-weight: 400;
            color: #94a3b8;
            white-space: nowrap;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s ease;
            transform: translateY(5px);
        }

        .copy-tooltip::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 10px;
            border: 6px solid transparent;
            border-top-color: rgba(15, 15, 30, 0.95);
        }

        .copy-tooltip.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .copy-btn {
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.2);
            color: #a78bfa; padding: 4px 6px; border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .copy-btn svg { width: 14px; height: 14px; }
        .copy-btn:hover { background: rgba(99, 102, 241, 0.25); color: #c4b5fd; }
        .copy-btn.copied {
            background: rgba(34, 197, 94, 0.15);
            border-color: rgba(34, 197, 94, 0.3); color: #4ade80;
        }

        pre {
            padding: 14px 16px; overflow-x: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.82rem; line-height: 1.7;
        }
        pre::-webkit-scrollbar { height: 5px; }
        pre::-webkit-scrollbar-track { background: transparent; }
        pre::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 3px; }

        .cmd { color: #7dd3fc; } .flag { color: #fbbf24; }
        .arg { color: #34d399; } .comment { color: #4a5568; font-style: italic; }
        .path { color: #f9a8d4; } .kw { color: #c084fc; }
        .str { color: #86efac; } .punct { color: #64748b; }
        .num { color: #fb923c; }

        .intro-box {
            background: rgba(99, 102, 241, 0.04);
            border: 1px solid rgba(99, 102, 241, 0.12);
            border-radius: 10px; padding: 16px 20px; margin-bottom: 18px;
        }
        .intro-box p { color: #94a3b8; font-size: 0.88rem; margin-bottom: 8px; }
        .intro-box p:last-child { margin-bottom: 0; }
        .intro-box strong { color: #c4b5fd; }

        .info-box {
            background: rgba(59, 130, 246, 0.06);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-left: 3px solid #3b82f6;
            border-radius: 8px; padding: 14px 18px; margin: 14px 0;
        }
        .info-box p { color: #93c5fd; font-size: 0.88rem; }

        .warning-box {
            background: rgba(251, 191, 36, 0.06);
            border: 1px solid rgba(251, 191, 36, 0.2);
            border-left: 3px solid #fbbf24;
            border-radius: 8px; padding: 14px 18px; margin: 14px 0;
        }
        .warning-box p { color: #fde68a; font-size: 0.88rem; }

        .warning-box .warn-tip {
            position: relative; cursor: help;
            border-bottom: 1px dashed rgba(251, 191, 36, 0.4);
        }
        .warning-box .warn-tip .warn-tooltip {
            display: none; position: absolute;
            bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%);
            background: rgba(15, 15, 30, 0.95);
            border: 1px solid rgba(251, 191, 36, 0.25);
            border-radius: 8px; padding: 12px 16px;
            font-size: 0.82rem; font-weight: 400;
            color: #fde68a; line-height: 1.6;
            width: max-content; max-width: 420px;
            z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            pointer-events: none;
        }
        .warning-box .warn-tip .warn-tooltip::after {
            content: ''; position: absolute; top: 100%; left: 50%;
            transform: translateX(-50%);
            border: 6px solid transparent; border-top-color: rgba(15, 15, 30, 0.95);
        }
        .warning-box .warn-tip:hover .warn-tooltip { display: block; animation: tip-fade 0.2s ease; }

        .critical-box {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-left: 4px solid #ef4444;
            border-radius: 10px; padding: 18px 22px; margin: 18px 0;
        }
        .critical-box .critical-title {
            display: flex; align-items: center; gap: 8px;
            color: #fca5a5; font-weight: 700; font-size: 0.95rem;
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px;
        }
        .critical-box p { color: #fca5a5; font-size: 0.88rem; margin-bottom: 8px; }
        .critical-box p:last-child { margin-bottom: 0; }
        .critical-box code {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.25);
            padding: 2px 8px; border-radius: 5px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; color: #fca5a5;
        }
        .critical-box ul { list-style: none; padding: 0; margin: 8px 0; }
        .critical-box ul li {
            padding: 3px 0 3px 18px; position: relative;
            color: #fca5a5; font-size: 0.85rem;
        }
        .critical-box ul li::before {
            content: '!'; position: absolute; left: 2px; top: 3px;
            width: 14px; height: 14px;
            background: rgba(239, 68, 68, 0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; font-weight: 700; color: #fca5a5;
        }

        .safe-box {
            background: rgba(34, 197, 94, 0.06);
            border: 1px solid rgba(34, 197, 94, 0.2);
            border-left: 3px solid #22c55e;
            border-radius: 8px; padding: 14px 18px; margin: 14px 0;
        }
        .safe-box p { color: #86efac; font-size: 0.88rem; }
        .safe-box code {
            background: rgba(34, 197, 94, 0.12);
            border: 1px solid rgba(34, 197, 94, 0.25);
            padding: 2px 8px; border-radius: 5px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; color: #86efac;
        }

        .recommended-badge {
            display: inline-flex; align-items: center; gap: 5px;
            font-size: 0.68rem; font-weight: 700; color: #4ade80;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.25);
            padding: 3px 10px; border-radius: 999px;
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px;
        }

        .card .card-title { display: flex; align-items: center; gap: 8px; }

        .gc-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 18px;
        }
        @media (max-width: 640px) { .gc-grid { grid-template-columns: 1fr; } }

        .gc-card {
            background: rgba(15, 15, 25, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 12px; padding: 18px;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s ease;
        }
        .gc-card:hover { border-color: rgba(99, 102, 241, 0.25); }
        .gc-card.recommended {
            border-color: rgba(34, 197, 94, 0.3);
            background: rgba(34, 197, 94, 0.04);
        }
        .gc-card.recommended:hover { border-color: rgba(34, 197, 94, 0.45); }
        .gc-card .gc-label {
            font-size: 0.68rem; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 5px;
        }
        .gc-card .gc-label.safe { color: #4ade80; }
        .gc-card .gc-label.moderate { color: #fbbf24; }
        .gc-card .gc-label.aggressive { color: #fb923c; }
        .gc-card .gc-title {
            font-weight: 600; color: #c4b5fd;
            font-size: 0.92rem; margin-bottom: 5px;
            position: relative; cursor: help;
        }
        .gc-card .gc-title .tooltip {
            display: none; position: absolute;
            bottom: calc(100% + 8px); left: 0;
            background: rgba(15, 15, 30, 0.95);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 8px; padding: 12px 16px;
            font-size: 0.82rem; font-weight: 400;
            color: #94a3b8; line-height: 1.6;
            width: max-content; max-width: 400px;
            z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            pointer-events: none;
        }
        .gc-card .gc-title .tooltip::after {
            content: ''; position: absolute; top: 100%; left: 20px;
            border: 6px solid transparent; border-top-color: rgba(15, 15, 30, 0.95);
        }
        .gc-card .gc-title .tooltip .tip_example {
            display: block; margin-top: 8px; padding: 6px 10px;
            background: rgba(99, 102, 241, 0.08); border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.76rem; color: #a78bfa;
        }
        .gc-card .gc-title:hover .tooltip { display: block; animation: tip-fade 0.2s ease; }
        .gc-card .gc-desc { color: #94a3b8; font-size: 0.82rem; margin-bottom: 10px; }
        .gc-card .gc-code {
            background: #0d1117;
            border: 1px solid rgba(99, 102, 241, 0.12);
            border-radius: 8px; padding: 10px 14px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.78rem; line-height: 1.6;
            color: #7dd3fc; overflow-x: auto; position: relative;
        }
        .gc-card .gc-code .copy-btn { position: absolute; top: 8px; right: 8px; }

        .risk-table {
            width: 100%; border-collapse: collapse; margin: 14px 0; font-size: 0.88rem;
            background: rgba(15, 15, 25, 0.6);
            border: 1px solid rgba(99, 102, 241, 0.1);
            border-radius: 12px;
            backdrop-filter: blur(10px);
            overflow: hidden;
        }
        .risk-table th {
            text-align: left; padding: 10px 14px;
            background: rgba(99, 102, 241, 0.08);
            color: #a78bfa; font-weight: 600;
            font-size: 0.78rem; text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid rgba(99, 102, 241, 0.15);
        }
        .risk-table td {
            padding: 10px 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            color: #cbd5e1;
        }
        .risk-table tr:hover td { background: rgba(99, 102, 241, 0.03); }

        .risk-badge {
            display: inline-block; padding: 3px 10px; border-radius: 999px;
            font-size: 0.72rem; font-weight: 600;
        }
        .risk-badge.safe {
            background: rgba(34, 197, 94, 0.12); color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.25);
        }
        .risk-badge.moderate {
            background: rgba(251, 191, 36, 0.12); color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.25);
        }
        .risk-badge.aggressive {
            background: rgba(251, 146, 60, 0.12); color: #fb923c;
            border: 1px solid rgba(251, 146, 60, 0.25);
        }
        .risk-badge.very-aggressive {
            background: rgba(239, 68, 68, 0.12); color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }

        .steps { counter-reset: step; list-style: none; padding: 0; }
        .steps li {
            counter-increment: step;
            padding: 12px 0 12px 46px; position: relative;
            color: #cbd5e1; font-size: 0.92rem;
            border-left: 1px solid rgba(99, 102, 241, 0.1); margin-left: 18px;
        }
        .steps li:last-child { border-left-color: transparent; }
        .steps li::before {
            content: counter(step); position: absolute; left: -13px; top: 12px;
            width: 26px; height: 26px;
            background: rgba(99, 102, 241, 0.15);
            border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 0.78rem; font-weight: 600; color: #a78bfa;
        }
        .steps li .step-desc { color: #94a3b8; font-size: 0.82rem; margin-top: 3px; }

        ul.plain-list { list-style: none; padding: 0; }
        ul.plain-list li {
            padding: 6px 0 6px 22px; position: relative;
            color: #cbd5e1; font-size: 0.92rem;
        }
        ul.plain-list li::before {
            content: ''; position: absolute; left: 4px; top: 16px;
            width: 6px; height: 6px; background: #6366f1; border-radius: 50%;
        }

        .inline-code {
            background: rgba(99, 102, 241, 0.1);
            border: 1px solid rgba(99, 102, 241, 0.15);
            padding: 2px 7px; border-radius: 5px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; color: #7dd3fc;
        }

        .page-nav {
            display: flex; justify-content: space-between; align-items: center;
            margin-top: 36px; padding: 30px 0 40px;
        }
        .page-nav-btn {
            display: flex; align-items: center; gap: 6px;
            padding: 8px 16px;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 8px;
            color: #94a3b8; font-family: 'Inter', sans-serif;
            font-size: 0.82rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s;
            min-width: 48px; min-height: 48px; justify-content: center;
        }
        .page-nav-btn:hover {
            background: rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3); color: #c4b5fd;
        }
        .page-nav-btn.disabled { opacity: 0.25; pointer-events: none; }
        .page-nav-btn .arrow { font-size: 1rem; line-height: 1; }
        .page-dots { display: flex; gap: 5px; }
        .page-dot {
            width: 7px; height: 7px; border-radius: 50%;
            background: rgba(99, 102, 241, 0.2); border: none;
            cursor: pointer; transition: all 0.2s; padding: 0;
        }
        .page-dot.active {
            background: #6366f1;
            box-shadow: 0 0 8px rgba(99, 102, 241, 0.4);
        }
        .page-dot:hover:not(.active) { background: rgba(99, 102, 241, 0.4); }

        .search-bar {
            max-width: 500px; margin: 12px auto 8px; padding: 0 20px;
            position: relative;
        }
        .search-input {
            width: 100%; padding: 10px 16px 10px 38px;
            background: rgba(15, 15, 25, 0.7);
            border: 1px solid rgba(99, 102, 241, 0.15);
            border-radius: 10px;
            color: #e2e8f0; font-family: 'Inter', sans-serif;
            font-size: 0.85rem; outline: none;
            transition: all 0.2s;
        }
        .search-input::placeholder { color: #475569; }
        .search-input:focus {

            box-shadow: 0 0 12px rgba(99, 102, 241, 0.1);
        }
        .search-icon {
            position: absolute; left: 34px; top: 50%; transform: translateY(-50%);
            color: #475569; font-size: 0.9rem; pointer-events: none;
        }
        .search-results {
            position: absolute; top: calc(100% + 6px); left: 20px; right: 20px;
            background: rgba(15, 15, 25, 0.97);
            border: 1px solid rgba(99, 102, 241, 0.2);
            border-radius: 10px; overflow: hidden;
            max-height: 360px; overflow-y: auto;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            z-index: 200; display: none;
        }
        .search-results.open { display: block; }
        .search-result {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 16px; cursor: pointer;
            border-bottom: 1px solid rgba(99, 102, 241, 0.08);
            transition: background 0.15s;
        }
        .search-result:last-child { border-bottom: none; }
        .search-result:hover, .search-result.selected {
            background: rgba(99, 102, 241, 0.12);
        }
        .search-result-icon { font-size: 1.1rem; flex-shrink: 0; }
        .search-result-page {
            font-size: 0.7rem; font-weight: 600; color: #6366f1;
            text-transform: uppercase; letter-spacing: 0.04em;
            flex-shrink: 0; min-width: 80px;
        }
        .search-result-text {
            font-size: 0.82rem; color: #94a3b8;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .search-result-text mark {
            background: rgba(99, 102, 241, 0.3); color: #c4b5fd;
            border-radius: 2px; padding: 0 2px;
        }
        .search-empty {
            padding: 20px 16px; text-align: center;
            color: #475569; font-size: 0.85rem;
        }
        .search-hint {
            position: absolute; right: 32px; top: 50%; transform: translateY(-50%);
            font-size: 0.65rem; color: #475569;
            background: rgba(99, 102, 241, 0.08);
            border: 1px solid rgba(99, 102, 241, 0.12);
            padding: 2px 6px; border-radius: 4px;
            pointer-events: none;
        }

        .search-highlight {
            background: rgba(251, 191, 36, 0.25);
            border: 1px solid rgba(251, 191, 36, 0.4);
            border-radius: 3px; padding: 0 2px;
            transition: background 0.5s;
        }

        footer {
            text-align: center; padding: 30px 0;
            color: #475569; font-size: 0.82rem;
        }

        .scroll-top {
            display: none;
            position: fixed; bottom: 24px; right: 24px;
            width: 48px; height: 48px;
            background: rgba(15, 15, 25, 0.9);
            border: 1px solid rgba(99, 102, 241, 0.5);
            border-radius: 50%;
            color: #a78bfa;
            font-size: 1.4rem;
            cursor: pointer;
            z-index: 300;
            transition: all 0.2s ease;
        }
        .scroll-top:hover {
            background: rgba(30, 30, 50, 0.95);
            border-color: rgba(99, 102, 241, 0.7);
            transform: translateY(-2px);
        }

        @media (max-width: 640px) {
            .page-nav-btn { padding: 8px 10px; min-width: 44px; }
            .page-nav-btn span:not(.arrow) { display: none; }
            .page-nav-btn .arrow { margin: 0; font-size: 1.4rem; font-weight: 300; }
        }

        @media (max-width: 768px) {
            .scroll-top { display: flex; align-items: center; justify-content: center; }
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.6rem; }
            .container { padding: 16px 14px 50px; }
            .card { padding: 16px; }
            pre { font-size: 0.75rem; padding: 12px 14px; }
        }
    </style>
</head>
<body>
    <img class="bg-logo" src="nixos-logo.svg" alt="">
    <div class="glow-orb purple"></div>
    <div class="glow-orb blue"></div>

    <div class="container">
        <header>
            <h1>Apuntes de NixOS</h1>
            <p>Guía personal de mantenimiento, limpieza y uso diario</p>
        </header>

        <div class="sticky-nav">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Buscar comandos, conceptos, paquetes..." autocomplete="off">
                <span class="search-hint">Ctrl+K</span>
                <div class="search-results" id="searchResults"></div>
            </div>

            <nav class="tab-bar">
                <div class="tab-inner">
                    <button class="tab-btn active" data-page="primeros"><span class="tab-icon">🚀</span> Primeros Pasos</button>
                    <button class="tab-btn" data-page="gc"><span class="tab-icon">🧹</span> GC</button>
                    <button class="tab-btn" data-page="generaciones"><span class="tab-icon">🗑️</span> Generaciones</button>
                    <button class="tab-btn" data-page="bootloader"><span class="tab-icon">🔧</span> Bootloader</button>
                    <button class="tab-btn" data-page="flakes"><span class="tab-icon">❄️</span> Flakes</button>
                    <button class="tab-btn" data-page="hibrida"><span class="tab-icon">🔀</span> Config Híbrida</button>
                    <button class="tab-btn" data-page="actualizar"><span class="tab-icon">🔄</span> Actualizar</button>
                    <button class="tab-btn" data-page="paquetes"><span class="tab-icon">📦</span> Paquetes</button>
                    <button class="tab-btn" data-page="automatizacion"><span class="tab-icon">⚙️</span> Automatizar</button>
                    <button class="tab-btn" data-page="extras"><span class="tab-icon">🧩</span> Extras</button>
                    <button class="tab-btn" data-page="hardware"><span class="tab-icon">🖥️</span> Hardware</button>
                </div>
            </nav>
        </div>

        <main id="content"></main>

        <nav class="page-nav" id="pageNav">
            <button class="page-nav-btn" id="prevBtn"><span class="arrow">‹</span> <span>Anterior</span></button>
            <div class="page-dots" id="pageDots"></div>
            <button class="page-nav-btn" id="nextBtn"><span>Siguiente</span> <span class="arrow">›</span></button>
        </nav>

        <footer>
            <p>Apuntes de NixOS</p>
        </footer>

        <button class="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>
    </div>

    <script>
        const pageIds = ['primeros', 'gc', 'generaciones', 'bootloader', 'flakes', 'hibrida', 'actualizar', 'paquetes', 'automatizacion', 'extras', 'hardware'];
        const pageIcons = { primeros: '🚀', gc: '🧹', generaciones: '🗑️', bootloader: '🔧', flakes: '❄️', hibrida: '🔀', actualizar: '🔄', paquetes: '📦', automatizacion: '⚙️', extras: '🧩', hardware: '🖥️' };
        const pageLabels = { primeros: 'Primeros Pasos', gc: 'GC', generaciones: 'Generaciones', bootloader: 'Bootloader', flakes: 'Flakes', hibrida: 'Config Híbrida', actualizar: 'Actualizar', paquetes: 'Paquetes', automatizacion: 'Automatizar', extras: 'Extras', hardware: 'Hardware' };

        let currentPage = 'primeros';
        let pageCache = {};
        let searchIndex = [];

        function showPage(id) {
            if (!pageIds.includes(id)) id = 'primeros';
            currentPage = id;

            const content = document.getElementById('content');
            content.style.animation = 'none';
            content.offsetHeight;
            content.style.animation = 'page-in 0.3s ease';

            if (pageCache[id]) {
                content.innerHTML = pageCache[id];
                initPageEvents();
            } else {
                fetch(`pages/${id}.html`)
                    .then(r => r.text())
                    .then(html => {
                        pageCache[id] = html;
                        content.innerHTML = html;
                        initPageEvents();
                    });
            }

            document.querySelectorAll('.tab-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.page === id);
            });

            updateDots();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function initPageEvents() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const dotsContainer = document.getElementById('pageDots');
            
            if (dotsContainer && dotsContainer.children.length === 0) {
                pageIds.forEach(id => {
                    const dot = document.createElement('button');
                    dot.className = 'page-dot';
                    dot.dataset.page = id;
                    dot.title = pageLabels[id] || id;
                    dot.addEventListener('click', () => showPage(id));
                    dotsContainer.appendChild(dot);
                });
            }
            
            updateNavButtons();
            initCopyButtons();
        }

        function updateNavButtons() {
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const idx = pageIds.indexOf(currentPage);
            
            if (prevBtn) {
                prevBtn.onclick = () => idx > 0 && showPage(pageIds[idx - 1]);
                prevBtn.classList.toggle('disabled', idx <= 0);
            }
            if (nextBtn) {
                nextBtn.onclick = () => idx < pageIds.length - 1 && showPage(pageIds[idx + 1]);
                nextBtn.classList.toggle('disabled', idx >= pageIds.length - 1);
            }
        }

        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => showPage(btn.dataset.page));
        });

        function updateDots() {
            document.querySelectorAll('.page-dot').forEach(dot => {
                dot.classList.toggle('active', dot.dataset.page === currentPage);
            });
            updateNavButtons();
        }

        function initCopyButtons() {
            document.querySelectorAll('.copy-btn').forEach(btn => {
                const existing = btn.querySelector('svg');
                if (existing) return;

                const tooltip = document.createElement('div');
                tooltip.className = 'copy-tooltip';
                tooltip.textContent = 'Copiar al portapapeles';
                document.body.appendChild(tooltip);

                btn.addEventListener('mouseenter', (e) => {
                    const rect = btn.getBoundingClientRect();
                    const tooltipHeight = 35;
                    const btnCenter = rect.top + (rect.height / 2);
                    tooltip.style.left = (rect.left + (rect.width / 2)) + 'px';
                    tooltip.style.top = (btnCenter - (tooltipHeight / 2) - 25) + 'px';
                    tooltip.classList.add('visible');
                });

                btn.addEventListener('mouseleave', () => {
                    tooltip.classList.remove('visible');
                });

                btn.onclick = () => {
                    const block = btn.closest('.code-block, .gc-code');
                    const codeEl = block.querySelector('code, pre');
                    const text = codeEl.textContent.trim();
                    navigator.clipboard.writeText(text).then(() => {
                        const originalHTML = btn.innerHTML;
                        btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
                        btn.classList.add('copied');
                        setTimeout(() => {
                            btn.innerHTML = originalHTML;
                            btn.classList.remove('copied');
                        }, 2000);
                    });
                    tooltip.classList.remove('visible');
                };
            });
        }

        document.addEventListener('keydown', (e) => {
            const idx = pageIds.indexOf(currentPage);
            if (e.key === 'ArrowRight' && idx < pageIds.length - 1) showPage(pageIds[idx + 1]);
            if (e.key === 'ArrowLeft' && idx > 0) showPage(pageIds[idx - 1]);
        });

        const stickyNav = document.querySelector('.sticky-nav');
        window.addEventListener('scroll', () => {
            stickyNav.classList.toggle('stuck', window.scrollY > 10);
        });

        function buildSearchIndex() {
            pageIds.forEach(id => {
                if (!pageCache[id]) return;
                const div = document.createElement('div');
                div.innerHTML = pageCache[id];
                const blocks = div.querySelectorAll('h2, h3, .card-title, .card-desc, .gc-title, .gc-desc, .gc-label, .intro-box p, .info-box p, .warning-box p, .critical-box p, code, pre');
                blocks.forEach(block => {
                    const text = block.textContent.trim();
                    if (text.length > 3) {
                        searchIndex.push({ pageId: id, text: text.toLowerCase(), original: text });
                    }
                });
            });
        }

        function ensureIndexBuilt() {
            if (searchIndex.length > 0) return;
            if (Object.keys(pageCache).length < pageIds.length) return;
            buildSearchIndex();
        }

        const searchInput = document.getElementById('searchInput');
        const searchResults = document.getElementById('searchResults');
        let selectedIndex = -1;

        searchInput.addEventListener('input', () => {
            ensureIndexBuilt();
            const query = searchInput.value.trim().toLowerCase();
            selectedIndex = -1;
            if (!query) { searchResults.classList.remove('open'); return; }

            const words = query.split(/\s+/).filter(w => w.length > 0);
            const matches = [];
            const seen = new Set();

            searchIndex.forEach(entry => {
                const allMatch = words.every(w => entry.text.includes(w));
                if (allMatch && !seen.has(entry.pageId + '|' + entry.text.substring(0, 60))) {
                    seen.add(entry.pageId + '|' + entry.text.substring(0, 60));
                    let score = 0;
                    words.forEach(w => { const idx = entry.text.indexOf(w); if (idx !== -1) score += w.length; });
                    matches.push({ ...entry, score });
                }
            });

            matches.sort((a, b) => b.score - a.score);

            if (matches.length === 0) {
                searchResults.innerHTML = '<div class="search-empty">Sin resultados</div>';
                searchResults.classList.add('open');
                return;
            }

            searchResults.innerHTML = matches.slice(0, 12).map((m, i) => {
                let display = escapeHtml(m.original);
                words.forEach(w => {
                    const regex = new RegExp(`(${escapeRegex(w)})`, 'gi');
                    display = display.replace(regex, '<mark>$1</mark>');
                });
                return `<div class="search-result" data-page="${m.pageId}" data-index="${i}">
                    <span class="search-result-icon">${pageIcons[m.pageId] || '📄'}</span>
                    <span class="search-result-page">${pageLabels[m.pageId] || m.pageId}</span>
                    <span class="search-result-text">${display}</span>
                </div>`;
            }).join('');

            searchResults.classList.add('open');

            searchResults.querySelectorAll('.search-result').forEach(el => {
                el.onclick = () => {
                    clearHighlights();
                    showPage(el.dataset.page);
                    highlightText(searchInput.value.trim());
                    searchResults.classList.remove('open');
                    searchInput.blur();
                };
                el.addEventListener('mouseenter', () => {
                    searchResults.querySelectorAll('.search-result').forEach(r => r.classList.remove('selected'));
                    el.classList.add('selected');
                    selectedIndex = parseInt(el.dataset.index);
                });
            });
        });

        searchInput.addEventListener('keydown', (e) => {
            const items = searchResults.querySelectorAll('.search-result');
            if (!items.length) return;
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
                items.forEach(r => r.classList.remove('selected'));
                items[selectedIndex]?.classList.add('selected');
                items[selectedIndex]?.scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                selectedIndex = Math.max(selectedIndex - 1, 0);
                items.forEach(r => r.classList.remove('selected'));
                items[selectedIndex]?.classList.add('selected');
                items[selectedIndex]?.scrollIntoView({ block: 'nearest' });
            } else if (e.key === 'Enter' && selectedIndex >= 0) {
                e.preventDefault();
                items[selectedIndex]?.click();
            } else if (e.key === 'Escape') {
                searchResults.classList.remove('open');
                searchInput.blur();
            }
        });

        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                searchInput.focus();
                searchInput.select();
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-bar')) {
                searchResults.classList.remove('open');
            }
        });

        function highlightText(query) {
            if (!query) return;
            const page = document.getElementById('content');
            if (!page) return;
            const words = query.split(/\s+/).filter(w => w.length > 1);
            if (!words.length) return;

            const walker = document.createTreeWalker(page, NodeFilter.SHOW_TEXT, {
                acceptNode: (node) => {
                    if (node.parentElement.closest('.search-results, .search-bar, script, style')) return NodeFilter.FILTER_REJECT;
                    const text = node.textContent.toLowerCase();
                    return words.some(w => text.includes(w)) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
                }
            });

            const nodes = [];
            while (walker.nextNode()) nodes.push(walker.currentNode);

            nodes.forEach(textNode => {
                const text = textNode.textContent;
                let html = escapeHtml(text);
                words.forEach(w => {
                    const regex = new RegExp(`(${escapeRegex(w)})`, 'gi');
                    html = html.replace(regex, '<span class="search-highlight">$1</span>');
                });
                if (html !== escapeHtml(text)) {
                    const span = document.createElement('span');
                    span.innerHTML = html;
                    textNode.parentNode.replaceChild(span, textNode);
                }
            });

            const first = page.querySelector('.search-highlight');
            if (first) {
                setTimeout(() => first.scrollIntoView({ behavior: 'smooth', block: 'center' }), 300);
            }
        }

        function clearHighlights() {
            document.querySelectorAll('.search-highlight').forEach(el => {
                const parent = el.parentNode;
                parent.replaceChild(document.createTextNode(el.textContent), el);
                parent.normalize();
            });
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        showPage('primeros');
    </script>
</body>
</html>
