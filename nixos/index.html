<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apuntes NixOS</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-WF80PK43WQ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-WF80PK43WQ');
    </script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <img class="bg-logo" src="img/nixos-logo.svg" alt="">
    <div class="glow-orb purple"></div>
    <div class="glow-orb blue"></div>

    <div class="container">
        <header>
            <h1>Apuntes de NixOS</h1>
            <p>Guía personal de mantenimiento, limpieza y uso diario</p>
        </header>

        <div class="sticky-nav">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="Buscar comandos, conceptos, paquetes..." autocomplete="off">
                <span class="search-hint">Ctrl+K</span>
                <div class="search-results" id="searchResults"></div>
            </div>

            <nav class="tab-bar">
                <div class="tab-inner">
                    <button class="tab-btn active" data-page="primeros"><span class="tab-icon">🚀</span> Primeros Pasos</button>
                    <button class="tab-btn" data-page="gc"><span class="tab-icon">🧹</span> GC</button>
                    <button class="tab-btn" data-page="generaciones"><span class="tab-icon">🗑️</span> Generaciones</button>
                    <button class="tab-btn" data-page="bootloader"><span class="tab-icon">🔧</span> Bootloader</button>
                    <button class="tab-btn" data-page="flakes"><span class="tab-icon">❄️</span> Flakes</button>
                    <button class="tab-btn" data-page="hibrida"><span class="tab-icon">🔀</span> Config Híbrida</button>
                    <button class="tab-btn" data-page="actualizar"><span class="tab-icon">🔄</span> Actualizar</button>
                    <button class="tab-btn" data-page="paquetes"><span class="tab-icon">📦</span> Paquetes</button>
                    <button class="tab-btn" data-page="automatizacion"><span class="tab-icon">⚙️</span> Automatizar</button>
                    <button class="tab-btn" data-page="extras"><span class="tab-icon">🧩</span> Extras</button>
                    <button class="tab-btn" data-page="hardware"><span class="tab-icon">🖥️</span> Hardware</button>
                </div>
            </nav>
        </div>

        <main id="content"></main>

        <nav class="page-nav" id="pageNav">
            <button class="page-nav-btn" id="prevBtn"><span class="arrow">‹</span> <span>Anterior</span></button>
            <div class="page-dots" id="pageDots"></div>
            <button class="page-nav-btn" id="nextBtn"><span>Siguiente</span> <span class="arrow">›</span></button>
        </nav>

        <footer>
            <p>Apuntes de NixOS</p>
        </footer>

        <button class="scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">↑</button>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
